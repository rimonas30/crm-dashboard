<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>vjsual CRM — Sales Insights</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    /* ── TOKENS ─────────────────────────────────────────── */
    :root {
      --bg:            #111110;
      --surface:       #171614;
      --surface-2:     #1c1b19;
      --surface-3:     #222120;
      --border:        #2e2d2b;
      --divider:       #252422;
      --text:          #cdccca;
      --text-muted:    #797876;
      --text-faint:    #454442;
      --primary:       #4f98a3;
      --primary-h:     #3a7f8a;
      --success:       #6daa45;
      --success-bg:    #1b2f1a;
      --error:         #cc5f5f;
      --error-bg:      #2c1a1a;
      --warn:          #c4813a;
      --warn-bg:       #2c2016;
      --gold:          #e8af34;
      --gold-bg:       #2a2213;
      --blue:          #5591c7;
      --blue-bg:       #151e2b;
      --shadow-sm:  0 1px 3px rgba(0,0,0,.25);
      --shadow-md:  0 4px 16px rgba(0,0,0,.35);
      --r-sm: .375rem;
      --r-md: .5rem;
      --r-lg: .75rem;
      --r-xl: 1rem;
      --font: 'Inter', system-ui, sans-serif;
      --mono: 'JetBrains Mono', monospace;
      --ease: 160ms cubic-bezier(0.16,1,0.3,1);
      --sidebar-w: 220px;
    }
    [data-theme="light"] {
      --bg:            #f4f3ef;
      --surface:       #faf9f7;
      --surface-2:     #ffffff;
      --surface-3:     #f0ede8;
      --border:        #d4d1ca;
      --divider:       #dcd9d5;
      --text:          #28251d;
      --text-muted:    #7a7974;
      --text-faint:    #bab9b4;
      --primary:       #01696f;
      --primary-h:     #0c4e54;
      --success:       #437a22;
      --success-bg:    #d4dfcc;
      --error:         #b03030;
      --error-bg:      #e2cfcf;
      --warn:          #964219;
      --warn-bg:       #ddcfc6;
      --gold:          #c48c00;
      --gold-bg:       #e9e0c6;
      --blue:          #006494;
      --blue-bg:       #c6d8e4;
      --shadow-sm:  0 1px 2px rgba(40,37,29,.06);
      --shadow-md:  0 4px 12px rgba(40,37,29,.1);
    }

    /* ── RESET ──────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; overflow: hidden; font-family: var(--font); background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; }
    @media (max-width: 1100px) {
      html, body { height: auto !important; overflow: visible !important; }
    }

    /* ── LAYOUT ─────────────────────────────────────────── */
    .app { display: flex; height: 100vh; overflow: hidden; }
    @media (max-width: 1100px) {
      .app { height: auto !important; overflow: visible !important; }
    }

    /* ── SIDEBAR ────────────────────────────────────────── */
    .sidebar {
      width: var(--sidebar-w);
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 0;
      overflow: hidden;
    }
    .sidebar-logo {
      padding: 1.25rem 1.25rem 1rem;
      border-bottom: 1px solid var(--divider);
      display: flex;
      align-items: center;
      gap: .625rem;
    }
    .logo-mark {
      width: 28px; height: 28px;
      background: var(--primary);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-mark svg { color: #fff; }
    .logo-text {
      font-size: .8125rem;
      font-weight: 700;
      letter-spacing: .03em;
      color: var(--text);
      line-height: 1.2;
    }
    .logo-sub { font-size: .625rem; font-weight: 400; color: var(--text-muted); letter-spacing: .02em; }

    .sidebar-nav { flex: 1; padding: .75rem .625rem; overflow-y: auto; }
    .nav-section-label {
      font-size: .625rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-faint);
      padding: .5rem .625rem .25rem;
    }
    .nav-item {
      display: flex; align-items: center; gap: .5rem;
      padding: .5rem .625rem;
      border-radius: var(--r-md);
      font-size: .8125rem;
      font-weight: 500;
      color: var(--text-muted);
      cursor: pointer;
      transition: background var(--ease), color var(--ease);
      user-select: none;
    }
    .nav-item:hover { background: var(--surface-2); color: var(--text); }
    .nav-item.active { background: var(--surface-2); color: var(--text); }
    .nav-item.active .nav-icon { color: var(--primary); }
    .nav-icon { width: 16px; height: 16px; flex-shrink: 0; }
    .nav-badge {
      margin-left: auto;
      background: var(--surface-3);
      color: var(--text-muted);
      font-size: .625rem;
      font-weight: 600;
      padding: .125rem .375rem;
      border-radius: 999px;
      font-family: var(--mono);
    }

    .sidebar-footer {
      padding: .75rem 1rem;
      border-top: 1px solid var(--divider);
      display: flex; align-items: center; justify-content: space-between;
      gap: .5rem;
    }
    .footer-updated {
      font-size: .6875rem;
      color: var(--text-faint);
      line-height: 1.3;
    }
    .footer-label { font-size: .625rem; color: var(--text-faint); text-transform: uppercase; letter-spacing: .06em; }

    /* Sync indicator */
    .sync-dot {
      width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0;
      background: var(--text-faint);
      transition: background .3s ease;
    }
    .sync-dot.syncing { background: var(--gold); animation: pulse 1s ease-in-out infinite; }
    .sync-dot.live    { background: var(--success); }
    .sync-dot.error   { background: var(--error); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
    .sync-row { display:flex; align-items:center; gap:.375rem; }

    /* ── EMBED / RESPONSIVE ─────────────────────────────── */
    @media (max-width: 1100px) {
      .app { flex-direction: column; }
      .sidebar {
        width: 100%; height: auto;
        flex-direction: row;
        border-right: none;
        border-bottom: 1px solid var(--border);
        padding: 0;
      }
      .sidebar-logo {
        border-bottom: none;
        padding: .625rem 1rem;
      }
      .sidebar-nav {
        flex: 1;
        display: flex;
        flex-direction: row;
        align-items: center;
        padding: .25rem .5rem;
        gap: .25rem;
        overflow-x: auto;
      }
      .nav-section-label { display: none; }
      .nav-item { white-space: nowrap; padding: .375rem .5rem; font-size: .75rem; }
      .sidebar-footer {
        border-top: none;
        border-left: 1px solid var(--divider);
        padding: .5rem .75rem;
        gap: .375rem;
      }
      .footer-updated { display: none; }
      .content { padding: 1rem; gap: 1rem; }
      .kpi-grid { grid-template-columns: repeat(5, 1fr); }
      .kpi-label { font-size: .5625rem; }
      .kpi-value { font-size: 1.375rem; }
      .charts-row-2 { grid-template-columns: 1fr 1fr; }
      .insights-grid { grid-template-columns: 1fr 1fr; }
    }
    @media (max-width: 700px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr); }
      .charts-row, .charts-row-2, .insights-grid { grid-template-columns: 1fr; }
      .logo-text { font-size: .6875rem; }
      .logo-sub { display: none; }
      .content { padding: .75rem; }
    }

    /* ── MAIN ───────────────────────────────────────────── */
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--bg);
    }
    @media (max-width: 1100px) {
      .main { overflow: visible !important; height: auto !important; }
    }
    .topbar {
      height: 52px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 1.5rem;
      gap: 1rem;
      background: var(--surface);
      flex-shrink: 0;
    }
    .topbar-title { font-size: .9375rem; font-weight: 600; flex: 1; }
    .topbar-actions { display: flex; align-items: center; gap: .5rem; }

    /* Period pills */
    .period-group { display: flex; background: var(--surface-3); border-radius: var(--r-md); padding: .1875rem; gap: .125rem; }
    .period-btn {
      font-size: .75rem; font-weight: 500;
      padding: .25rem .625rem;
      border-radius: .3125rem;
      border: none; background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--ease);
    }
    .period-btn.active { background: var(--surface-2); color: var(--text); box-shadow: var(--shadow-sm); }

    /* Icon buttons */
    .icon-btn {
      width: 32px; height: 32px;
      display: flex; align-items: center; justify-content: center;
      border-radius: var(--r-md);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--ease);
    }
    .icon-btn:hover { background: var(--surface-2); color: var(--text); }

    /* ── SCROLL CONTENT ─────────────────────────────────── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }
    @media (max-width: 1100px) {
      .content { overflow: visible !important; flex: none !important; height: auto !important; }
    }
    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── KPI GRID ───────────────────────────────────────── */
    .kpi-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: .875rem;
    }
    .kpi-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 1rem 1.125rem;
      display: flex;
      flex-direction: column;
      gap: .25rem;
      transition: box-shadow var(--ease);
    }
    .kpi-card:hover { box-shadow: var(--shadow-md); }
    .kpi-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: .375rem; }
    .kpi-label { font-size: .6875rem; font-weight: 600; text-transform: uppercase; letter-spacing: .07em; color: var(--text-muted); }
    .kpi-icon {
      width: 26px; height: 26px;
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .kpi-value { font-size: 1.625rem; font-weight: 700; line-height: 1.1; color: var(--text); font-variant-numeric: tabular-nums; }
    .kpi-sub { font-size: .75rem; color: var(--text-muted); margin-top: .125rem; }
    .kpi-badge {
      margin-top: .375rem;
      font-size: .625rem;
      font-weight: 600;
      padding: .1875rem .5rem;
      border-radius: 999px;
      width: fit-content;
    }
    .badge-success { background: var(--success-bg); color: var(--success); }
    .badge-error   { background: var(--error-bg);   color: var(--error); }
    .badge-blue    { background: var(--blue-bg);     color: var(--blue); }

    /* ── CHARTS ROW ─────────────────────────────────────── */
    .charts-row {
      display: grid;
      grid-template-columns: 2fr 1.5fr 1.25fr;
      gap: .875rem;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 1.125rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: .75rem;
    }
    .card-header { display: flex; align-items: flex-start; justify-content: space-between; }
    .card-title { font-size: .875rem; font-weight: 600; color: var(--text); line-height: 1.3; }
    .card-sub { font-size: .6875rem; color: var(--text-muted); margin-top: .125rem; }
    .chart-wrap { position: relative; flex: 1; min-height: 0; }
    .chart-wrap canvas { width: 100% !important; height: 100% !important; }

    /* ── CHARTS ROW 2 ───────────────────────────────────── */
    .charts-row-2 {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: .875rem;
    }

    /* ── FUNNEL ─────────────────────────────────────────── */
    .funnel { display: flex; flex-direction: column; gap: .5rem; flex: 1; }
    .funnel-row { display: flex; align-items: center; gap: .625rem; }
    .funnel-label { font-size: .6875rem; font-weight: 500; color: var(--text-muted); width: 80px; flex-shrink: 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .funnel-bar-wrap { flex: 1; }
    .funnel-bar-bg { height: 20px; background: var(--surface-3); border-radius: var(--r-sm); overflow: hidden; }
    .funnel-bar-fill {
      height: 100%;
      border-radius: var(--r-sm);
      display: flex; align-items: center; justify-content: flex-end; padding-right: .375rem;
      font-size: .625rem; font-weight: 700; color: rgba(255,255,255,.85);
      transition: width .5s cubic-bezier(0.16,1,0.3,1);
      min-width: 2px;
    }
    .funnel-meta { font-size: .625rem; font-family: var(--mono); color: var(--text-muted); width: 70px; text-align: right; flex-shrink: 0; }

    /* ── DONUT ──────────────────────────────────────────── */
    .donut-wrap { display: flex; align-items: center; gap: 1rem; flex: 1; }
    .donut-chart-wrap { position: relative; width: 110px; height: 110px; flex-shrink: 0; }
    .donut-chart-wrap canvas { width: 100% !important; height: 100% !important; }
    .donut-center {
      position: absolute; inset: 0;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .donut-pct { font-size: 1.1875rem; font-weight: 700; color: var(--text); line-height: 1; }
    .donut-lbl { font-size: .5625rem; color: var(--text-muted); margin-top: .125rem; text-transform: uppercase; letter-spacing: .06em; }
    .donut-legend { flex: 1; display: flex; flex-direction: column; gap: .5rem; }
    .legend-item { display: flex; align-items: center; justify-content: space-between; gap: .5rem; }
    .legend-dot-label { display: flex; align-items: center; gap: .375rem; }
    .legend-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .legend-item span { font-size: .75rem; color: var(--text-muted); }
    .legend-val { font-size: .6875rem; font-family: var(--mono); color: var(--text); }

    /* ── TOP CUSTOMERS ──────────────────────────────────── */
    .cust-list { display: flex; flex-direction: column; gap: .5rem; flex: 1; }
    .cust-row { display: flex; align-items: center; gap: .625rem; }
    .cust-rank { font-size: .625rem; font-family: var(--mono); font-weight: 600; color: var(--text-faint); width: 14px; text-align: right; flex-shrink: 0; }
    .cust-avatar {
      width: 26px; height: 26px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: .5rem; font-weight: 700; letter-spacing: .02em;
      flex-shrink: 0;
    }
    .cust-info { flex: 1; min-width: 0; }
    .cust-name { font-size: .75rem; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .cust-deals { font-size: .625rem; color: var(--text-muted); }
    .cust-amt { font-size: .75rem; font-family: var(--mono); font-weight: 600; color: var(--text); flex-shrink: 0; }

    /* ── DEAL TYPE ──────────────────────────────────────── */
    .type-list { display: flex; flex-direction: column; gap: .5rem; flex: 1; }
    .type-row { display: flex; align-items: center; gap: .5rem; }
    .type-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .type-name { font-size: .75rem; color: var(--text-muted); flex: 1; }
    .type-bar-wrap { width: 60px; }
    .type-bar-bg { height: 4px; background: var(--surface-3); border-radius: 2px; overflow: hidden; }
    .type-bar-fill { height: 100%; border-radius: 2px; }
    .type-count { font-size: .625rem; font-family: var(--mono); color: var(--text-muted); width: 16px; text-align: right; }
    .type-amt { font-size: .625rem; font-family: var(--mono); color: var(--text); width: 64px; text-align: right; }

    /* ── AGENT INSIGHTS ─────────────────────────────────── */
    .insights-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .875rem;
    }
    .insight-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: .875rem 1rem;
      display: flex;
      gap: .75rem;
      align-items: flex-start;
    }
    .insight-icon {
      width: 32px; height: 32px; border-radius: var(--r-md);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .insight-body { flex: 1; min-width: 0; }
    .insight-title { font-size: .8125rem; font-weight: 600; color: var(--text); margin-bottom: .25rem; }
    .insight-text { font-size: .75rem; color: var(--text-muted); line-height: 1.5; }
    .insight-value { font-size: 1.0625rem; font-weight: 700; color: var(--text); margin-top: .25rem; font-family: var(--mono); }

    /* ── TABLE ──────────────────────────────────────────── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: .8125rem; }
    thead tr { border-bottom: 1px solid var(--divider); }
    th {
      font-size: .625rem; font-weight: 600; text-transform: uppercase; letter-spacing: .08em;
      color: var(--text-muted); text-align: left; padding: .5rem .75rem .5rem 0;
      white-space: nowrap;
    }
    td { padding: .625rem .75rem .625rem 0; border-bottom: 1px solid var(--divider); color: var(--text); vertical-align: middle; }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: var(--surface-2); }

    .stage-chip {
      font-size: .625rem; font-weight: 600;
      padding: .1875rem .5rem; border-radius: 999px;
      white-space: nowrap;
    }
    .deal-link {
      display: inline-flex; align-items: center; gap: .25rem;
      font-size: .6875rem; color: var(--primary); text-decoration: none;
      transition: color var(--ease);
    }
    .deal-link:hover { color: var(--primary-h); }

    /* ── SECTION HEADER ─────────────────────────────────── */
    .section-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: .125rem;
    }
    .section-title {
      font-size: .6875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-faint);
    }

    /* ── SCROLLBAR ──────────────────────────────────────── */
    * { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  </style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-mark">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
          <polyline points="16 7 22 7 22 13"/>
        </svg>
      </div>
      <div>
        <div class="logo-text">vjsual</div>
        <div class="logo-sub">Sales Insights</div>
      </div>
    </div>

    <nav class="sidebar-nav">
      <div class="nav-section-label">Ansichten</div>
      <div class="nav-item active" onclick="switchView('overview')" id="nav-overview">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        Dashboard
        <span class="nav-badge" id="badge-overview"></span>
      </div>
      <div class="nav-item" onclick="switchView('deals')" id="nav-deals">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
        </svg>
        Alle Deals
        <span class="nav-badge" id="badge-deals"></span>
      </div>
      <div class="nav-item" onclick="switchView('customers')" id="nav-customers">
        <svg class="nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        Kunden
        <span class="nav-badge" id="badge-customers"></span>
      </div>
    </nav>

    <div class="sidebar-footer">
      <div class="footer-updated" style="flex:1;min-width:0">
        <div class="sync-row">
          <div class="sync-dot syncing" id="sync-indicator"></div>

function renderInsights(won, lost, open, wonAmt, openAmt, avgDeal, winRate, topCustomers, typeEntries, all) {
  const insights = [];

  // 1. Conversion rate
  insights.push({
    icon: '📊',
    iconStyle: 'background:var(--blue-bg);color:var(--blue)',
    title: 'Win-Rate',
    text: `${winRate}% der abgeschlossenen Deals werden gewonnen. Das entspricht ${won.length} von ${won.length+lost.length} Deals.`,
    value: null,
    color: 'var(--blue)',
  });

  // 2. Top customer concentration
  const top1 = topCustomers[0];
  if(top1) {
    const concentration = pct(top1.amount, wonAmt);
    insights.push({
      icon: '⚠️',
      iconStyle: concentration>40?'background:var(--warn-bg);color:var(--warn)':'background:var(--success-bg);color:var(--success)',
      title: 'Kundenkonzentration',
      text: `${top1.name} macht ${concentration}% deines Gesamtumsatzes aus.${concentration>40?' Diversifikation empfohlen.':' Gute Risikostreuung.'}`,
      value: null,
      color: concentration>40?'var(--warn)':'var(--success)',
    });
  }

  // 3. Pipeline value at risk
  if(open.length>0) {
    insights.push({
      icon: '🎯',
      iconStyle: 'background:var(--gold-bg);color:var(--gold)',
      title: 'Pipeline-Potential',
      text: `${open.length} offene Deals mit einem Gesamtvolumen von ${fmt(openAmt)} warten auf Abschluss.`,
      value: fmt(openAmt),
      color: 'var(--gold)',
    });
  }

  // 4. Avg deal size insight
  const largest = [...all].sort((a,b)=>b.dealSize-a.dealSize)[0];
  if(largest) {
    insights.push({
      icon: '🏆',
      iconStyle: 'background:var(--gold-bg);color:var(--gold)',
      title: 'Größter Deal',
      text: `"${largest.name}" (${largest.company||'—'}) ist mit ${fmt(largest.dealSize)} dein größter Deal im CRM.`,
      value: null,
      color: 'var(--gold)',
    });
  }

  // 5. No deal type tracking
  const untyped = all.filter(d=>!d.dealType).length;
  if(untyped > 0) {
    insights.push({
      icon: '🏷️',
      iconStyle: 'background:var(--warn-bg);color:var(--warn)',
      title: 'Deal-Typen fehlen',
      text: `${untyped} von ${all.length} Deals haben keinen Deal-Typ gesetzt. Vollständiges Tagging verbessert die Analyse.`,
      value: null,
      color: 'var(--warn)',
    });
  }

  // 6. Umsatz pro Monat (Hochrechnung)
  const wonThisYear = all.filter(d=>{
    const dt = new Date(d.last_edited_time);
    return d.stage==='Closed Won' && dt.getFullYear()===new Date().getFullYear();
  });
  const monthsElapsed = new Date().getMonth()+1;
  const monthlyAvg = wonThisYear.reduce((s,d)=>s+d.dealSize,0) / monthsElapsed;
  if(monthlyAvg>0) {
    insights.push({
      icon: '📈',
      iconStyle: 'background:var(--success-bg);color:var(--success)',
      title: 'Monatlicher Umsatz',
      text: `Ø ${fmt(monthlyAvg)} pro Monat in ${new Date().getFullYear()}. Jahres-Hochrechnung: ${fmt(monthlyAvg*12)}.`,
      value: null,
      color: 'var(--success)',
    });
  }

  const grid = document.getElementById('insights-grid');
  if(!grid) return;
  grid.innerHTML = insights.map(ins=>`
    <div class="insight-card">
      <div class="insight-icon" style="${ins.iconStyle}">${ins.icon}</div>
      <div class="insight-body">
        <div class="insight-title">${ins.title}</div>
        <div class="insight-text">${ins.text}</div>
        ${ins.value ? `<div class="insight-value" style="color:${ins.color}">${ins.value}</div>` : ''}
      </div>
    </div>
  `).join('');
}

// ── CUSTOMERS VIEW ────────────────────────────────────
function renderCustomers() {
  const byCompany = {};
  allDeals.forEach(d=>{
    const c = d.company || d.name;
    if(!byCompany[c]) byCompany[c]={name:c,total:0,won:0,open:0,lost:0,deals:0,types:new Set()};
    byCompany[c].deals++;
    byCompany[c].total += d.dealSize;
    if(d.stage==='Closed Won')  byCompany[c].won  += d.dealSize;
    if(d.stage==='Closed Lost') byCompany[c].lost += d.dealSize;
    if(!['Closed Won','Closed Lost'].includes(d.stage)) byCompany[c].open += d.dealSize;
    if(d.dealType) byCompany[c].types.add(d.dealType);
  });
  const sorted = Object.values(byCompany).sort((a,b)=>b.won-a.won||b.total-a.total);

  document.getElementById('content').innerHTML = `
    <div class="card" style="flex:1">
      <div class="card-header">
        <div>
          <div class="card-title">Kunden-Übersicht</div>
          <div class="card-sub">${sorted.length} Kunden · nach Umsatz sortiert</div>
        </div>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Kunde</th>
            <th style="text-align:right">Deals</th>
            <th style="text-align:right">Gewonnen</th>
            <th style="text-align:right">Offen</th>
            <th style="text-align:right">Verloren</th>
            <th>Typen</th>
          </tr></thead>
          <tbody>
            ${sorted.map((c,i)=>{
              const [fg,bg] = AVATAR_SETS[i % AVATAR_SETS.length];
              return `<tr>
                <td>
                  <div style="display:flex;align-items:center;gap:.625rem">
                    <div style="width:26px;height:26px;border-radius:6px;background:${bg};color:${fg};display:flex;align-items:center;justify-content:center;font-size:.5625rem;font-weight:700;flex-shrink:0">${initials(c.name)}</div>
                    <span style="font-weight:500;max-width:200px;display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${c.name}</span>
                  </div>
                </td>
                <td style="text-align:right;font-family:var(--mono)">${c.deals}</td>
                <td style="text-align:right;font-family:var(--mono);color:var(--success)">${c.won?fmt(c.won):'—'}</td>
                <td style="text-align:right;font-family:var(--mono);color:var(--blue)">${c.open?fmt(c.open):'—'}</td>
                <td style="text-align:right;font-family:var(--mono);color:var(--error)">${c.lost?fmt(c.lost):'—'}</td>
                <td style="color:var(--text-muted);font-size:.6875rem">${[...c.types].join(', ')||'—'}</td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ── LIVE FETCH ───────────────────────────────────────
async function loadDeals() {
  const indicator = document.getElementById('sync-indicator');
  const syncLabel  = document.getElementById('sync-label');
  if (indicator) indicator.classList.add('syncing');
  if (syncLabel) syncLabel.textContent = 'Wird geladen…';
  try {
    const r   = await fetch(API_URL, { cache: 'no-cache' });
    if (!r.ok) throw new Error('HTTP ' + r.status);
    const data = await r.json();
    const fresh = data.deals || [];
    if (fresh.length > 0) {
      allDeals = fresh;
      const ts = new Date(data.timestamp);
      const fmt = ts.toLocaleString('de-DE', {day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'});
      if (syncLabel) syncLabel.textContent = 'Sync: ' + fmt + ' Uhr';
      if (indicator) indicator.classList.remove('syncing');
      if (indicator) indicator.classList.add('live');
    } else {
      throw new Error('No deals in response');
    }
  } catch (err) {
    console.warn('Live fetch failed, using baked data:', err.message);
    allDeals = BAKED_DEALS;
    if (syncLabel) syncLabel.textContent = 'Offline-Daten (Fallback)';
    if (indicator) indicator.classList.remove('syncing');
    if (indicator) indicator.classList.add('error');
  }
  destroyCharts();
  render();
}

// ── INIT ──────────────────────────────────────────────
// Show baked data immediately, then refresh from live API
render();
loadDeals();
</script>
